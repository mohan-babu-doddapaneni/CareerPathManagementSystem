version: "3.9"

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: careerpath
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-postgres}@db:5432/careerpath
      REDIS_URL: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_files:/app/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_dataset --noinput 2>/dev/null || true &&
             python manage.py seed_jobs --noinput 2>/dev/null || true &&
             python manage.py seed_skills --noinput 2>/dev/null || true &&
             python manage.py seed_courses --noinput 2>/dev/null || true &&
             gunicorn config.wsgi:application
               --bind 0.0.0.0:8000
               --workers 4
               --threads 2
               --worker-class gthread
               --timeout 120
               --access-logfile -
               --error-logfile -"

  celery:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-postgres}@db:5432/careerpath
      REDIS_URL: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker --loglevel=info --concurrency=2

volumes:
  postgres_data:
  media_files:
