{% extends "account/base.html" %}
{% block title %}Reset Password{% endblock %}
{% block inner %}
<h1 class="text-2xl font-bold text-gray-900 mb-1">Reset your password</h1>
<p class="text-sm text-gray-500 mb-6">Enter your email and we'll send you a reset link.</p>
<form method="POST" action="{% url 'account_reset_password' %}" class="space-y-4">
  {% csrf_token %}
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
    <input type="email" name="email" required
           class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
           placeholder="you@example.com">
  </div>
  <button type="submit"
          class="w-full py-2.5 bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-lg text-sm transition-colors">
    Send reset link
  </button>
</form>
<p class="text-center text-sm text-gray-500 mt-6">
  <a href="{% url 'account_login' %}" class="text-brand-600 hover:underline">Back to sign in</a>
</p>
{% endblock %}
