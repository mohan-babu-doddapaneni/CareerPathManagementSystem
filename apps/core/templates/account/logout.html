{% extends "account/base.html" %}
{% block title %}Sign Out{% endblock %}
{% block inner %}
<div class="text-center">
  <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
    <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
    </svg>
  </div>
  <h1 class="text-xl font-bold text-gray-900 mb-2">Sign out?</h1>
  <p class="text-sm text-gray-500 mb-6">You will be signed out of your CareerPath account.</p>
  <form method="POST" action="{% url 'account_logout' %}">
    {% csrf_token %}
    <button type="submit"
            class="w-full py-2.5 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-lg text-sm transition-colors mb-3">
      Yes, sign me out
    </button>
  </form>
  <a href="{% url 'core:dashboard' %}" class="block text-sm text-gray-500 hover:text-gray-700">Cancel</a>
</div>
{% endblock %}
